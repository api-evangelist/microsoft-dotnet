aid: microsoft-dotnet
url: https://raw.githubusercontent.com/api-evangelist/microsoft-dotnet/refs/heads/main/apis.yml
apis:
  - aid: microsoft-dotnet:api-browser
    name: .NET API Browser
    tags:
      - .NET
      - Framework
      - Runtime
      - API Reference
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://learn.microsoft.com/en-us/dotnet/api/
    properties:
      - url: https://learn.microsoft.com/en-us/dotnet/api/
        type: Documentation
    description: >-
      The .NET API Browser provides comprehensive documentation for all
      .NET APIs including .NET Runtime, ASP.NET Core, Entity Framework
      Core, and Azure SDK libraries. It serves as the central reference
      for all classes, methods, properties, and events available in the
      .NET ecosystem.
  - aid: microsoft-dotnet:aspnet-core
    name: ASP.NET Core Web API
    tags:
      - .NET
      - Web API
      - REST
      - Web Framework
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://learn.microsoft.com/en-us/aspnet/core/web-api/
    properties:
      - url: https://learn.microsoft.com/en-us/aspnet/core/web-api/
        type: Documentation
    description: >-
      ASP.NET Core provides a framework for building RESTful web APIs with
      .NET. It includes features for routing, model binding, validation,
      content negotiation, OpenAPI integration, and middleware pipeline
      configuration. Developers can build high-performance APIs with
      built-in dependency injection and cross-platform support.
